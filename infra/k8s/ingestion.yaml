apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: ollive
  labels:
    app: ingestion
spec:
  selector: { app: ingestion }
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: ollive
spec:
  replicas: 2  # workers share a consumer group so this scales horizontally
  selector:
    matchLabels: { app: ingestion }
  template:
    metadata:
      labels: { app: ingestion }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ingestion
          image: ollive/ingestion:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef: { name: ollive-config }
          env:
            - name: INFERENCE_CONSUMER
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
          readinessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
