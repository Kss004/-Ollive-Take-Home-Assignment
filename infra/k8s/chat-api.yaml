apiVersion: v1
kind: Service
metadata:
  name: chat-api
  namespace: ollive
spec:
  selector: { app: chat-api }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api
  namespace: ollive
spec:
  replicas: 2
  selector:
    matchLabels: { app: chat-api }
  template:
    metadata:
      labels: { app: chat-api }
    spec:
      containers:
        - name: chat-api
          image: ollive/chat-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: ollive-config }
            - secretRef:    { name: ollive-secrets }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
