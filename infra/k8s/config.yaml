apiVersion: v1
kind: ConfigMap
metadata:
  name: ollive-config
  namespace: ollive
data:
  DATABASE_URL: postgresql://ollive:ollive@postgres:5432/ollive
  REDIS_URL: redis://redis:6379/0
  INGESTION_URL: http://ingestion:8001
  CHAT_API_URL: http://chat-api:8000
  NEXT_PUBLIC_CHAT_API_URL: http://localhost:8000
  INFERENCE_STREAM: "inference:logs"
  INFERENCE_DLQ: "inference:logs:dlq"
  INFERENCE_GROUP: "ingest"
  INFERENCE_CONSUMER: "worker-1"
  DEFAULT_PROVIDER: "openai"
  DEFAULT_MODEL: "gpt-4o-mini"
  ALLOWED_ORIGINS: "*"
---
# Replace placeholder values via `kubectl edit secret ollive-secrets -n ollive`
# or generate at install time with:
#   kubectl create secret generic ollive-secrets -n ollive \
#     --from-literal=OPENAI_API_KEY=... --from-literal=ANTHROPIC_API_KEY=... \
#     --from-literal=GOOGLE_API_KEY=...
apiVersion: v1
kind: Secret
metadata:
  name: ollive-secrets
  namespace: ollive
type: Opaque
stringData:
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
