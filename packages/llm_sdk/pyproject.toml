[project]
name = "llm-sdk"
version = "0.1.0"
description = "Ollive lightweight LLM SDK with multi-provider streaming + inference logging"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "redis>=5.0",
    "openai>=1.40",
    "anthropic>=0.34",
    "google-genai>=0.3",
    "tenacity>=8.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/llm_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
